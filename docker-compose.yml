services:
  postgres:
    image: postgres:16
    container_name: messenger67-postgres
    environment:
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger
      POSTGRES_DB: messenger
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  api:
    build: ./api
    container_name: messenger67-api
    working_dir: /app
    environment:
      PORT: "3000"
      DATABASE_URL: "postgres://messenger:messenger@postgres:5432/messenger"
      COOKIE_SECURE: "auto"
      ORIGIN: "https://67b67t.ru"
      S3_ENDPOINT: "https://s3.twcstorage.ru"
      S3_BUCKET: "07926a34-8ef1-41d3-a318-583c00dae033"
      S3_ACCESS_KEY: "QFUZXU5JKWW8771QDQXG"
      S3_SECRET_KEY: "MQdCxzBsW1DfDkqiDxph31Lh4jyiohFonKmnCcYm"
      S3_REGION: "ru-1"
      SWIFT_ENDPOINT: "https://swift.twcstorage.ru"
      SWIFT_ACCESS_KEY: "fg636452:swift"
      SWIFT_SECRET_KEY: "3OcyOTleGW0d3UKS6bhYUm9g46UYb6KXurvcM0U5"
      HCAPTCHA_SECRET: "ES_0b58af413b9a4b918833b0dbbe382f50"
      NODE_ENV: "production"
      RETURN_TOKEN: "false"
    volumes:
      - ./api:/app
      - uploads:/app/uploads
    command: sh -lc "npm install && npm run start"
    depends_on:
      - postgres
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: messenger67-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  turn:
    image: coturn/coturn:latest
    container_name: messenger67-turn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "10000-10100:10000-10100/udp"
    environment:
      - TURN_SECRET=messenger67turnsecret
      - TURN_REALM=67b67t.ru
      - HCAPTCHA_SECRET=ES_0b58af413b9a4b918833b0dbbe382f50
    command: >
      -n --log-file=stdout
      --min-port=10000 --max-port=10100
      --realm=67b67t.ru
      --fingerprint
      --lt-cred-mech
      --user=messenger:messenger67pass
      --no-cli
      --cert=/etc/caddy/certificates/acme-v02.api.letsencrypt.org-directory/67b67t.ru/67b67t.ru.crt
      --pkey=/etc/caddy/certificates/acme-v02.api.letsencrypt.org-directory/67b67t.ru/67b67t.ru.key
    volumes:
      - caddy_data:/etc/caddy/certificates:ro
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  uploads: